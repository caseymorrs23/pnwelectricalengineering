<script>
function gtagSendEvent() {
  gtag('event', 'conversion_event_submit_lead_form', {
    event_callback: function () {
      document.getElementById('quote-form').submit();
    },
    event_timeout: 2000
  });
  return false;
}

document.getElementById('quote-form').addEventListener('submit', function(e) {
  e.preventDefault();
  gtagSendEvent();
});
</script>
